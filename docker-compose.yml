#Oracle XE Docker Configuration

services:
  oraclexe:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oraclexe
    ports:
      - "1521:1521"   # Oracle SQL*Net
      - "5500:5500"   # Oracle Enterprise Manager
    environment:
      ORACLE_PWD: password  # Replace with your own strong password
    restart: unless-stopped
    volumes:
      - "./exdata:/home/exdata"